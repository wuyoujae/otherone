appId: com.otherone.app
productName: OtherOne
directories:
  output: dist-electron
  buildResources: resources
files:
  - electron/dist/**/*
  - "!electron/dist/**/*.map"
extraResources:
  - from: .next/standalone
    to: app
    filter:
      - "**/*"
  - from: .next/static
    to: app/.next/static
    filter:
      - "**/*"
  - from: public
    to: app/public
    filter:
      - "**/*"
publish:
  provider: github
  owner: wuyoujae
  repo: otherone
mac:
  category: public.app-category.developer-tools
  identity: null
  target:
    - dmg
    - zip
win:
  target:
    - nsis
linux:
  target:
    - AppImage
