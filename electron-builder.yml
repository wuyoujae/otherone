appId: com.otherone.app
productName: OtherOne
icon: resources/icon.png
directories:
  output: dist-electron
  buildResources: resources
files:
  - electron/dist/**/*
  - "!electron/dist/**/*.map"
extraResources:
  - from: .next/standalone
    to: app
    filter:
      - "**/*"
  - from: .next/static
    to: app/.next/static
    filter:
      - "**/*"
  - from: public
    to: app/public
    filter:
      - "**/*"
  - from: server/dist
    to: api-server/dist
    filter:
      - "**/*"
  - from: server/node_modules
    to: api-server/node_modules
    filter:
      - "**/*"
  - from: server/node_modules/.prisma
    to: api-server/node_modules/.prisma
    filter:
      - "**/*"
  - from: server/prisma
    to: api-server/prisma
    filter:
      - "**/*"
  - from: server/.env
    to: api-server/.env
publish:
  provider: github
  owner: wuyoujae
  repo: otherone
mac:
  category: public.app-category.developer-tools
  identity: null
  icon: resources/icon.icns
  target:
    - dmg
    - zip
win:
  icon: resources/icon.ico
  target:
    - nsis
linux:
  icon: resources/icon.png
  target:
    - AppImage
