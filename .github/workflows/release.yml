name: Build & Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true

  build:
    needs: create_release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Build desktop app
        run: npm run build:desktop

      - name: Package desktop app (${{ matrix.platform }})
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish never

      - name: Upload release assets (${{ matrix.platform }})
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*-mac.yml
            dist-electron/*.exe
            dist-electron/*.msi
            dist-electron/latest.yml
            dist-electron/*.blockmap
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm
            dist-electron/latest-linux.yml

      - name: Build packages only (${{ matrix.platform }})
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder
